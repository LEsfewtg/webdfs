<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast" class="toast"><span class="online-dot"></span><span id="toast-text">Đã cập nhật</span></div>
  <script>
    const rooms = [
      {id:'ROOM-A01',short:'A01',name:'Phòng A01',block:'Khối A · Tầng 1',capacity:30,students:30,state:'warning',label:'Cần chú ý',teacher:'Nguyễn Thị Thu Hà',subject:'Toán học',exam:'Thi học kỳ II',time:'07:30 - 09:30',device:'SIMULATOR-01',cameras:4,field:11.7,current:796.7,session:125,sequence:15,incidents:1,last:'Vừa xong'},
      {id:'ROOM-A02',short:'A02',name:'Phòng A02',block:'Khối A · Tầng 1',capacity:32,students:28,state:'active',label:'Đang hoạt động',teacher:'Trần Văn Minh',subject:'Ngữ văn',exam:'Thi học kỳ II',time:'07:30 - 09:00',device:'EXAM-HUB-02',cameras:3,field:3.2,current:512.4,session:421,sequence:63,incidents:0,last:'20 giây trước'},
      {id:'ROOM-A03',short:'A03',name:'Phòng A03',block:'Khối A · Tầng 1',capacity:30,students:29,state:'active',label:'Đang hoạt động',teacher:'Lê Thị Hương',subject:'Tiếng Anh',exam:'Thi học kỳ II',time:'09:45 - 11:15',device:'EXAM-HUB-03',cameras:4,field:2.8,current:488.1,session:310,sequence:42,incidents:0,last:'12 giây trước'},
      {id:'ROOM-A04',short:'A04',name:'Phòng A04',block:'Khối A · Tầng 2',capacity:30,students:0,state:'offline',label:'Chưa kết nối',teacher:'Phạm Quốc Tuấn',subject:'Vật lý',exam:'Chờ ca thi',time:'13:30 - 15:00',device:'Chưa kết nối',cameras:4,field:0,current:0,session:0,sequence:0,incidents:0,last:'Không có dữ liệu'},
      {id:'ROOM-B01',short:'B01',name:'Phòng B01',block:'Khối B · Tầng 1',capacity:28,students:28,state:'warning',label:'Cần chú ý',teacher:'Đỗ Thị Thanh',subject:'Hóa học',exam:'Thi học kỳ II',time:'07:30 - 09:00',device:'EXAM-HUB-05',cameras:3,field:8.4,current:701.2,session:287,sequence:31,incidents:2,last:'5 giây trước'},
      {id:'ROOM-B02',short:'B02',name:'Phòng B02',block:'Khối B · Tầng 1',capacity:30,students:27,state:'active',label:'Đang hoạt động',teacher:'Vũ Hoàng Nam',subject:'Sinh học',exam:'Thi học kỳ II',time:'09:45 - 11:15',device:'EXAM-HUB-06',cameras:4,field:2.2,current:455.3,session:198,sequence:25,incidents:0,last:'Vừa xong'},
      {id:'ROOM-B03',short:'B03',name:'Phòng B03',block:'Khối B · Tầng 2',capacity:30,students:0,state:'offline',label:'Chưa kết nối',teacher:'Ngô Thị Mai',subject:'Lịch sử',exam:'Chờ ca thi',time:'13:30 - 15:00',device:'Chưa kết nối',cameras:3,field:0,current:0,session:0,sequence:0,incidents:0,last:'Không có dữ liệu'},
      {id:'ROOM-LAB01',short:'LAB01',name:'Phòng thực hành',block:'Khối học tập · Tầng 1',capacity:24,students:22,state:'active',label:'Đang hoạt động',teacher:'Bùi Đức Anh',subject:'Tin học',exam:'Thi thực hành',time:'10:00 - 11:30',device:'LAB-GATEWAY-01',cameras:4,field:1.9,current:433.8,session:506,sequence:72,incidents:0,last:'8 giây trước'}
    ];
    const state = {view:'home', selected:'ROOM-A01', query:'', filter:'all', sideQuery:'', modal:false, method:'lan', connectionStep:'select', cameraPaused:false, fullscreenCamera:null};

    function icon(name,size=18){
      const paths={
        shield:'<path d="M12 3 4.8 6v5.6c0 4.5 3.1 7.6 7.2 9.4 4.1-1.8 7.2-4.9 7.2-9.4V6L12 3Z"/><path d="m8.6 12 2.1 2.1 4.8-5"/>',
        plug:'<path d="M8 3v5M16 3v5M6 8h12v3a6 6 0 0 1-6 6v4M9 21h6"/>',
        search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-3.4-3.4"/>',
        rooms:'<rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 8h3v3H8zM13 8h3v3h-3zM8 13h3v3H8zM13 13h3v3h-3z"/>',
        live:'<path d="M4 12h2l2-3 3 6 2-4 2 2h5"/>',
        alert:'<path d="M12 3 2.8 19h18.4L12 3Z"/><path d="M12 9v4M12 16h.01"/>',
        offline:'<circle cx="12" cy="12" r="8"/><path d="m5 5 14 14"/>',
        user:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
        clock:'<circle cx="12" cy="12" r="8"/><path d="M12 7v5l3 2"/>',
        camera:'<path d="M4 7h3l1.5-2h7L17 7h3v12H4z"/><circle cx="12" cy="13" r="4"/>',
        device:'<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M10 17h4"/>',
        chevron:'<path d="m9 18 6-6-6-6"/>',
        arrow:'<path d="m15 18-6-6 6-6"/>',
        wifi:'<path d="M4 9a12 12 0 0 1 16 0M7 12a8 8 0 0 1 10 0M10 15a4 4 0 0 1 4 0"/><circle cx="12" cy="19" r="1"/>',
        qr:'<path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h2v2h-2zM18 14h2v6h-4v-2h-2v2"/>',
        usb:'<path d="M12 3v14M8 7l4-4 4 4M8 12H5v4a3 3 0 0 0 3 3h4M16 14h3v-3"/><circle cx="19" cy="10" r="1"/>',
        play:'<path d="m8 5 11 7-11 7z"/>',
        pause:'<path d="M8 5v14M16 5v14"/>',
        expand:'<path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/>',
        close:'<path d="m6 6 12 12M18 6 6 18"/>',
        check:'<path d="m5 12 4 4L19 6"/>',
        list:'<path d="M8 6h11M8 12h11M8 18h11"/><path d="M4 6h.01M4 12h.01M4 18h.01"/>',
        refresh:'<path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 4v7h-7"/>',
        info:'<circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/>'
      };
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[name]||paths.info}</svg>`;
    }
    function initials(name){return name.split(' ').slice(-2).map(x=>x[0]).join('').toUpperCase()}
    function statusCounts(){return {active:rooms.filter(r=>r.state==='active').length,warning:rooms.filter(r=>r.state==='warning').length,offline:rooms.filter(r=>r.state==='offline').length}}
    function renderHeader(){return `<header class="topbar">
      <div class="brand" data-action="home"><div class="brand-mark">${icon('shield',28)}</div><div><div class="brand-title">ExamShield</div><div class="brand-subtitle">Hệ thống hỗ trợ giám sát phòng thi</div></div></div>
      <div class="topbar-actions"><div class="pill school-pill">Trường THPT Cẩm Giàng</div><div class="pill"><span class="online-dot"></span><strong>Dữ liệu trực tuyến</strong></div><button class="btn btn-primary" data-action="open-connect">${icon('plug',17)}<span>Kết nối thiết bị</span></button></div>
    </header>`}
    function renderHome(){
      const c=statusCounts();
      const q=state.query.toLowerCase().trim();
      const filtered=rooms.filter(r=>(state.filter==='all'||r.state===state.filter)&&(`${r.id} ${r.name} ${r.block} ${r.teacher} ${r.subject}`.toLowerCase().includes(q)));
      return `<div class="app">${renderHeader()}<main class="home-main">
        <div class="page-kicker">QUẢN LÝ KỲ THI</div>
        <div class="home-title-row"><div><h1>Danh sách phòng thi</h1><p>Theo dõi trạng thái, giáo viên coi thi, thiết bị và camera mô phỏng theo từng phòng.</p></div><div class="date-chip"><strong>${new Intl.DateTimeFormat('vi-VN',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'}).format(new Date())}</strong><br><span style="font-size:11px">Ca sáng · Dữ liệu mô phỏng</span></div></div>
        <section class="stats-row">
          <article class="stat-card"><div class="stat-icon">${icon('rooms',22)}</div><div><strong>${rooms.length}</strong><span>Tổng số phòng thi</span></div></article>
          <article class="stat-card active"><div class="stat-icon">${icon('live',22)}</div><div><strong>${c.active}</strong><span>Đang hoạt động</span></div></article>
          <article class="stat-card warning"><div class="stat-icon">${icon('alert',22)}</div><div><strong>${c.warning}</strong><span>Cần chú ý</span></div></article>
          <article class="stat-card offline"><div class="stat-icon">${icon('offline',22)}</div><div><strong>${c.offline}</strong><span>Chưa kết nối</span></div></article>
        </section>
        <section class="toolbar"><label class="search">${icon('search',18)}<input id="home-search" value="${escapeHtml(state.query)}" placeholder="Tìm mã phòng, giáo viên, môn thi..."></label><div class="filters">
          ${[['all','Tất cả'],['active','Đang hoạt động'],['warning','Cần chú ý'],['offline','Chưa kết nối']].map(([k,v])=>`<button class="filter-btn ${state.filter===k?'active':''}" data-filter="${k}">${v}</button>`).join('')}
        </div></section>
        <section class="rooms-section"><div class="section-card rooms-panel"><div class="section-head"><div><div class="page-kicker">PHÒNG THI HÔM NAY</div><h2>${filtered.length} phòng phù hợp</h2></div><div class="soft-pill">Nhấn vào phòng để xem chi tiết</div></div>
          <div class="room-grid">${filtered.length?filtered.map(renderRoomCard).join(''):`<div class="empty-state" style="grid-column:1/-1">${icon('search',36)}<strong>Không tìm thấy phòng</strong><span>Thử thay đổi từ khóa hoặc bộ lọc trạng thái.</span></div>`}</div>
        </div>
        <aside class="section-card guide-panel"><div class="section-head"><div><div class="page-kicker">PHƯƠNG ÁN KẾT NỐI</div><h3>Kết nối thiết bị phòng thi</h3></div></div><div class="guide-list">
          <div class="guide-item"><div class="guide-num">1</div><div><strong>LAN / Wi‑Fi nội bộ</strong><span>Khuyến nghị cho phòng cố định, ổn định và dễ quản lý.</span></div></div>
          <div class="guide-item"><div class="guide-num">2</div><div><strong>Mã ghép nối</strong><span>Nhập mã hiển thị trên thiết bị hoặc quét QR để liên kết nhanh.</span></div></div>
          <div class="guide-item"><div class="guide-num">3</div><div><strong>USB / Serial Bridge</strong><span>Dùng ứng dụng cầu nối cục bộ cho cảm biến thử nghiệm.</span></div></div>
          <div class="guide-item"><div class="guide-num">4</div><div><strong>Chế độ mô phỏng</strong><span>Không cần phần cứng, phù hợp thuyết trình và kiểm thử giao diện.</span></div></div>
        </div><button class="btn btn-primary" style="width:100%;margin-top:13px" data-action="open-connect">${icon('plug',17)} Kết nối thiết bị</button>
        <div class="connection-health"><small>Độ ổn định hệ thống</small><strong>86%</strong><span style="font-size:11px;opacity:.78">6/8 phòng đang truyền dữ liệu</span><div class="health-bar"><div></div></div></div>
        </aside></section>
      </main></div>`;
    }
    function renderRoomCard(r){return `<article class="room-card"><div class="room-card-head"><div class="room-code">${r.short}</div><span class="status-chip ${r.state}">${r.label}</span></div><h3>${r.name}</h3><div class="room-location">${r.block}</div>
      <div class="room-details"><div class="detail-mini"><span>Môn thi</span><strong>${r.subject}</strong></div><div class="detail-mini"><span>Thời gian</span><strong>${r.time}</strong></div><div class="detail-mini"><span>Thí sinh</span><strong>${r.students}/${r.capacity}</strong></div><div class="detail-mini"><span>Camera</span><strong>${r.cameras} góc nhìn</strong></div></div>
      <div class="teacher-line"><div class="avatar">${initials(r.teacher)}</div><div><span>Giáo viên coi thi</span><strong>${r.teacher}</strong></div></div>
      <div class="room-actions"><button class="btn btn-secondary btn-sm" data-connect-room="${r.id}">${icon('plug',14)} Kết nối</button><button class="btn btn-primary btn-sm" data-room="${r.id}">Mở phòng ${icon('chevron',14)}</button></div></article>`}
    function renderDetail(){
      const room=rooms.find(r=>r.id===state.selected)||rooms[0],c=statusCounts();
      const sideQ=state.sideQuery.toLowerCase().trim(), sideRooms=rooms.filter(r=>`${r.id} ${r.name} ${r.teacher}`.toLowerCase().includes(sideQ));
      const zones=makeZones(room);
      return `<div class="app">${renderHeader()}<div class="detail-layout"><aside class="sidebar"><div class="sidebar-head"><div><div class="page-kicker">QUẢN LÝ KHÔNG GIAN</div><h2>Danh sách phòng</h2></div><div class="count-badge">${rooms.length}</div></div>
        <label class="side-search">${icon('search',16)}<input id="side-search" value="${escapeHtml(state.sideQuery)}" placeholder="Tìm phòng, giáo viên..."></label>
        <div class="side-stats"><div><strong>${c.active}</strong><span>Hoạt động</span></div><div><strong>${c.warning}</strong><span>Cần chú ý</span></div><div><strong>${c.offline}</strong><span>Chưa kết nối</span></div></div>
        <div class="side-room-list">${sideRooms.map(r=>`<button class="side-room ${r.id===room.id?'selected':''}" data-room="${r.id}"><span class="room-code">${r.short}</span><span><div class="side-room-title">${r.name}</div><div class="side-room-sub">${r.teacher} · ${r.subject}</div></span><span class="status-chip ${r.state}" style="padding:5px 6px"></span></button>`).join('')}</div>
        <div class="back-home"><button class="btn btn-ghost" data-action="home">${icon('arrow',16)} Danh sách phòng thi</button></div></aside>
        <main class="detail-main"><div class="breadcrumb"><button data-action="home">Danh sách phòng thi</button><span>/</span><strong>${room.id}</strong></div>
          <section class="hero"><div><h1>${room.name}</h1><p>${room.block} · Sức chứa ${room.capacity} học sinh</p><div class="hero-meta"><span class="hero-tag">${room.exam}</span><span class="hero-tag">${room.subject}</span><span class="hero-tag">${room.time}</span></div></div><div class="room-alert ${room.state}"><div class="alert-icon">${icon(room.state==='active'?'check':room.state==='warning'?'alert':'offline',19)}</div><div><span>TRẠNG THÁI PHÒNG</span><strong>${room.label}</strong></div></div></section>
          <section class="meta-grid">${infoCard('rooms','MÃ PHÒNG',room.id)}${infoCard('user','GIÁO VIÊN COI THI',room.teacher)}${infoCard('device','THIẾT BỊ',room.device)}${infoCard('camera','CAMERA',`${room.cameras} góc nhìn`)}${infoCard('refresh','CẬP NHẬT GẦN NHẤT',room.last)}</section>
          <section class="card panel"><div class="section-title"><div><div class="page-kicker">BẢN ĐỒ TÍN HIỆU</div><h3>Phân vùng phòng học</h3></div><div class="soft-pill">Dữ liệu chỉ hỗ trợ khoanh vùng</div></div><div class="zones">${zones.map(zoneCard).join('')}</div></section>
          <section class="card camera-panel"><div class="section-title"><div><div class="page-kicker">GIÁM SÁT HÌNH ẢNH</div><h3>Camera mô phỏng toàn phòng thi</h3></div><div class="camera-toolbar"><button class="btn btn-ghost btn-sm" data-action="toggle-camera">${icon(state.cameraPaused?'play':'pause',14)} ${state.cameraPaused?'Tiếp tục':'Tạm dừng'}</button><button class="btn btn-secondary btn-sm" data-fullscreen="CAM-01">${icon('expand',14)} Toàn màn hình</button></div></div>
            <div class="camera-grid"><div class="camera-primary">${cameraFeed(room,'CAM-01','Toàn cảnh phòng',30,false)}</div><div class="camera-side">${cameraFeed(room,'CAM-02','Dãy trái',12,true)}${cameraFeed(room,'CAM-03','Dãy giữa',12,true)}${cameraFeed(room,'CAM-04','Dãy phải',12,true)}</div></div>
            <div class="camera-note">${icon('info',17)}<span><strong>Camera đang ở chế độ mô phỏng.</strong> Giao diện minh họa vị trí bàn thi, trạng thái camera và cảnh báo vùng; không truyền hình ảnh thật.</span></div>
          </section>
          <section class="summary-grid">${summaryCard('live','CẢM BIẾN TỪ TRƯỜNG',`${room.field.toFixed(1)} đơn vị lệch nền`,`Giá trị hiện tại: ${room.current.toFixed(1)}`)}${summaryCard('clock','PHIÊN THIẾT BỊ',`${room.session} giây`,`Sequence: ${room.sequence}`)}${summaryCard('list','SỰ CỐ ĐÃ LƯU',String(room.incidents),'50 bản ghi gần nhất của phòng')}</section>
          <section class="card log-panel"><div class="section-title"><div><div class="page-kicker">NHẬT KÝ AN NINH</div><h3>Sự kiện gần nhất</h3></div><div class="soft-pill">Không tự động kết luận vi phạm</div></div><div class="table-wrap"><table><thead><tr><th>Thời gian</th><th>Vùng</th><th>Loại</th><th>RF lệch nền</th><th>Từ trường</th><th>Camera</th><th>Độ tin cậy</th></tr></thead><tbody>${room.incidents?`<tr><td>13:54:57 28-06</td><td>Dãy phải</td><td>Biến thiên RF</td><td>${room.state==='warning'?'82.1':'12.8'} mV</td><td>${room.field.toFixed(1)}</td><td>CAM-04</td><td><span class="confidence">91%</span></td></tr>`:`<tr><td colspan="7" style="text-align:center;color:#8798aa;padding:24px">Chưa ghi nhận sự kiện bất thường trong phòng này.</td></tr>`}</tbody></table></div></section>
        </main></div></div>`;
    }
    function infoCard(ic,label,value){return `<div class="info-card"><div class="info-icon">${icon(ic,18)}</div><div style="min-width:0"><span>${label}</span><strong title="${value}">${value}</strong></div></div>`}
    function summaryCard(ic,label,value,note){return `<div class="summary-card"><div class="info-icon">${icon(ic,19)}</div><div><span>${label}</span><strong>${value}</strong><small>${note}</small></div></div>`}
    function makeZones(r){const base=r.state==='offline'?0:r.field;return [
      {title:'Dãy trái',signal:r.state==='offline'?0:1442.6+base,offset:r.state==='warning'?7.4:1.1,anomaly:r.state==='warning'?1.05:.13,progress:r.state==='offline'?0:36},
      {title:'Dãy giữa',signal:r.state==='offline'?0:1475.7+base,offset:r.state==='warning'?.7:.4,anomaly:r.state==='warning'?.10:.08,progress:r.state==='offline'?0:48},
      {title:'Dãy phải',signal:r.state==='offline'?0:1497.9+base,offset:r.state==='warning'?82.1:1.8,anomaly:r.state==='warning'?10.30:.18,progress:r.state==='offline'?0:r.state==='warning'?86:58}
    ]}
    function zoneCard(z){return `<article class="zone-card"><div class="zone-head"><div class="info-icon">${icon('live',17)}</div><div><span>PHÂN VÙNG</span><strong>${z.title}</strong></div></div><div class="progress"><div style="width:${z.progress}%"></div></div><div class="metrics"><div class="metric"><span>Tín hiệu</span><strong>${z.signal.toFixed(1)} mV</strong></div><div class="metric"><span>Lệch nền</span><strong>${z.offset.toFixed(1)} mV</strong></div><div class="metric"><span>Điểm bất thường</span><strong>${z.anomaly.toFixed(2)}</strong></div><div class="metric"><span>Công suất ước tính</span><strong>— dBm</strong></div></div></article>`}
    function classroomDesks(count,mini,room){let out='';const n=mini?12:30;for(let i=0;i<n;i++){const absent=i>=room.students;const flagged=room.state==='warning'&&(i===8||i===22);out+=`<div class="desk"><span class="student ${flagged?'flagged':''} ${absent?'absent':''}"></span></div>`}return out}
    function cameraFeed(room,id,label,count,mini){return `<div class="camera-feed ${state.cameraPaused?'paused':''} ${mini?'mini-view':''}" data-fullscreen="${id}"><div class="camera-top"><span class="camera-live">LIVE · ${id}</span><span>${room.name}</span></div><div class="classroom"><div class="board"></div><div class="teacher-desk"></div><div class="desk-grid">${classroomDesks(count,mini,room)}</div><div class="scan-line"></div><span class="camera-corner tl"></span><span class="camera-corner tr"></span><span class="camera-corner bl"></span><span class="camera-corner br"></span></div><div class="camera-footer"><span>${label}</span><span data-live-clock>${new Date().toLocaleTimeString('vi-VN')}</span></div></div>`}
    function renderModal(){
      if(!state.modal)return '';
      const room=rooms.find(r=>r.id===state.selected)||rooms[0];
      if(state.connectionStep==='connecting')return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><div><div class="page-kicker">ĐANG THIẾT LẬP</div><h2>Kết nối ${room.name}</h2></div></div><div class="modal-body connecting"><div class="loader"></div><h3>Đang kiểm tra thiết bị và đường truyền...</h3><p>Vui lòng giữ cửa sổ này mở trong vài giây.</p><div class="connection-log">[01] Khởi tạo phiên ExamShield<br>[02] Kiểm tra cấu hình phòng ${room.id}<br>[03] Xác thực kênh ${state.method.toUpperCase()}<br>[04] Đồng bộ cảm biến và camera mô phỏng...</div></div></div></div>`;
      if(state.connectionStep==='success')return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><div><div class="page-kicker">HOÀN TẤT</div><h2>Kết nối thiết bị</h2></div><button class="btn btn-ghost icon-only" data-action="close-connect">${icon('close',18)}</button></div><div class="modal-body success-box"><div class="success-check">${icon('check',34)}</div><h3>Kết nối thành công</h3><p>${room.name} đã sẵn sàng truyền dữ liệu mô phỏng.</p><div class="pair-code">${room.device}</div></div><div class="modal-foot"><button class="btn btn-primary" data-action="open-connected-room">Mở phòng thi ${icon('chevron',15)}</button></div></div></div>`;
      const methods=[
        ['lan','wifi','LAN / Wi‑Fi nội bộ','Nhập địa chỉ IP của bộ điều khiển trong cùng mạng trường học.','Khuyến nghị'],
        ['pair','qr','Mã ghép nối / QR','Dùng mã 6 chữ số hiển thị trên thiết bị để ghép nối nhanh.',''],
        ['usb','usb','USB / Serial Bridge','Kết nối cảm biến qua ứng dụng cầu nối chạy trên máy tính.',''],
        ['demo','play','Chế độ mô phỏng','Không cần thiết bị thật, tạo dữ liệu mẫu để thuyết trình.','']
      ];
      return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><div><div class="page-kicker">THIẾT LẬP THIẾT BỊ</div><h2>Kết nối thiết bị phòng thi</h2></div><button class="btn btn-ghost icon-only" data-action="close-connect">${icon('close',18)}</button></div><div class="modal-body">
        <div class="form-grid"><div class="field"><label>Phòng cần kết nối</label><select id="connect-room">${rooms.map(r=>`<option value="${r.id}" ${r.id===room.id?'selected':''}>${r.name} · ${r.teacher}</option>`).join('')}</select></div><div class="field"><label>Tên cấu hình</label><input value="ExamShield - ${room.short}" aria-label="Tên cấu hình"></div></div>
        <div class="page-kicker" style="margin-top:17px">CHỌN PHƯƠNG ÁN KẾT NỐI</div><div class="method-grid">${methods.map(m=>`<button class="method-card ${state.method===m[0]?'selected':''}" data-method="${m[0]}"><span class="method-radio"></span><span style="display:block"><strong>${icon(m[1],16)} ${m[2]}</strong><span>${m[3]}</span>${m[4]?`<span class="recommended">${m[4]}</span>`:''}</span></button>`).join('')}</div>
        ${connectionFields()}
        <div class="connection-plan"><h4>Quy trình kết nối đề xuất</h4><div class="plan-steps"><div class="plan-step"><b>1</b><strong>Chọn phòng</strong><span>Xác định đúng phòng thi và giáo viên phụ trách.</span></div><div class="plan-step"><b>2</b><strong>Khai báo thiết bị</strong><span>Nhập IP, mã ghép nối hoặc cổng USB.</span></div><div class="plan-step"><b>3</b><strong>Kiểm tra tín hiệu</strong><span>Đồng bộ cảm biến và các góc camera.</span></div><div class="plan-step"><b>4</b><strong>Hoàn tất</strong><span>Lưu cấu hình và mở trang giám sát.</span></div></div></div>
      </div><div class="modal-foot"><button class="btn btn-ghost" data-action="close-connect">Hủy</button><button class="btn btn-primary" data-action="start-connect">${icon('plug',16)} Bắt đầu kết nối</button></div></div></div>`;
    }
    function connectionFields(){
      if(state.method==='lan')return `<div class="form-grid"><div class="field"><label>Địa chỉ IP thiết bị</label><input value="192.168.1.120" placeholder="192.168.1.120"></div><div class="field"><label>Cổng kết nối</label><input value="8080" placeholder="8080"></div></div>`;
      if(state.method==='pair')return `<div class="form-grid"><div class="field"><label>Mã ghép nối 6 chữ số</label><input value="684 219" placeholder="000 000"></div><div class="field"><label>Chế độ xác thực</label><select><option>Tự động xác thực</option><option>Xác nhận thủ công</option></select></div></div>`;
      if(state.method==='usb')return `<div class="form-grid"><div class="field"><label>Cổng thiết bị</label><select><option>COM3 · ExamShield Bridge</option><option>COM4 · USB Serial</option></select></div><div class="field"><label>Tốc độ Baud</label><select><option>115200</option><option>57600</option><option>9600</option></select></div></div>`;
      return `<div class="form-grid"><div class="field"><label>Kịch bản mô phỏng</label><select><option>Phòng thi đang hoạt động</option><option>Phát hiện tín hiệu bất thường</option><option>Mất kết nối thiết bị</option></select></div><div class="field"><label>Tần suất cập nhật</label><select><option>Mỗi 3 giây</option><option>Mỗi 5 giây</option><option>Mỗi 10 giây</option></select></div></div>`;
    }
    function renderFullscreen(){if(!state.fullscreenCamera)return '';const room=rooms.find(r=>r.id===state.selected)||rooms[0];return `<div class="camera-fullscreen"><button class="btn btn-danger close-camera" data-action="close-fullscreen">${icon('close',16)} Đóng</button>${cameraFeed(room,state.fullscreenCamera,'Toàn cảnh phòng',30,false)}</div>`}
    function render(){document.getElementById('app').innerHTML=state.view==='home'?renderHome():renderDetail();document.getElementById('modal-root').innerHTML=renderModal()+renderFullscreen();bindInputs();}
    function bindInputs(){const hs=document.getElementById('home-search');if(hs)hs.addEventListener('input',e=>{state.query=e.target.value;const pos=e.target.selectionStart;render();const next=document.getElementById('home-search');if(next){next.focus();next.setSelectionRange(pos,pos)}});const ss=document.getElementById('side-search');if(ss)ss.addEventListener('input',e=>{state.sideQuery=e.target.value;const pos=e.target.selectionStart;render();const next=document.getElementById('side-search');if(next){next.focus();next.setSelectionRange(pos,pos)}});const cr=document.getElementById('connect-room');if(cr)cr.addEventListener('change',e=>{state.selected=e.target.value;render()});}
    function openConnect(roomId){if(roomId)state.selected=roomId;state.modal=true;state.connectionStep='select';render()}
    function startConnect(){state.connectionStep='connecting';render();setTimeout(()=>{const room=rooms.find(r=>r.id===state.selected);room.state='active';room.label='Đang hoạt động';room.device=state.method==='demo'?`SIMULATOR-${room.short}`:`EXAM-HUB-${room.short}`;room.last='Vừa xong';room.session=1;room.sequence=1;if(room.students===0)room.students=Math.min(room.capacity,28);state.connectionStep='success';render();},1800)}
    function showToast(text){const el=document.getElementById('toast');document.getElementById('toast-text').textContent=text;el.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>el.classList.remove('show'),2600)}
    document.addEventListener('click',e=>{
      const action=e.target.closest('[data-action]')?.dataset.action;
      const roomBtn=e.target.closest('[data-room]');const connectRoom=e.target.closest('[data-connect-room]');const filter=e.target.closest('[data-filter]');const method=e.target.closest('[data-method]');const fs=e.target.closest('[data-fullscreen]');
      if(connectRoom){e.stopPropagation();openConnect(connectRoom.dataset.connectRoom);return}
      if(roomBtn){state.selected=roomBtn.dataset.room;state.view='detail';window.scrollTo({top:0,behavior:'smooth'});render();return}
      if(filter){state.filter=filter.dataset.filter;render();return}
      if(method){state.method=method.dataset.method;render();return}
      if(fs&&!action){state.fullscreenCamera=fs.dataset.fullscreen;render();return}
      if(action==='home'){state.view='home';state.modal=false;state.fullscreenCamera=null;window.scrollTo({top:0,behavior:'smooth'});render()}
      if(action==='open-connect')openConnect()
      if(action==='close-connect'){state.modal=false;state.connectionStep='select';render()}
      if(action==='start-connect')startConnect()
      if(action==='open-connected-room'){state.modal=false;state.view='detail';state.connectionStep='select';render();showToast('Thiết bị đã kết nối và phòng thi đã được mở.')}
      if(action==='toggle-camera'){state.cameraPaused=!state.cameraPaused;render();showToast(state.cameraPaused?'Đã tạm dừng camera mô phỏng.':'Camera mô phỏng đã tiếp tục.')}
      if(action==='close-fullscreen'){state.fullscreenCamera=null;render()}
    });
    function escapeHtml(s){return String(s).replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]))}
    setInterval(()=>document.querySelectorAll('[data-live-clock]').forEach(el=>el.textContent=new Date().toLocaleTimeString('vi-VN')),1000);
    render();
  </script>
</body>
</html>
